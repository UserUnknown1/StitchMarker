<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StitchMarker</title>
    <h1>All Projects</h1>
</head>
<body>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Yarn Type</th>
            <th>Action</th>
        </tr>
        {%for p in projects%}
        <tr>
            <td>{{p.id}}</td>
            <td>{{p.name}}</td>
            <td>{{p.yarn_type}}</td>
            <td>
                <a href="/projects/update/{{ p.id }}">
            <button type="button">Update</button>
        </a>
                <form action="/projects/delete/{{p.id}}"  method="post">
                    <button type="submit"> Delete </button>

                </form></td>
        </tr>
        {%endfor%}
    </table>
    <div>
        <form action="/projects/get_form/" method="get">
        <button type="submit">Add More</button>
        </form>
        <a href="/">
            <button>Back to Home</button>
        </a>
    </div>
    
</body>
</html>
